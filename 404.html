<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirecting…</title>
<script>
  var repo = '/seikphyu';
  var loc = window.location;
  var path = loc.pathname;
  if (path.indexOf(repo) === 0) {
    path = path.slice(repo.length);
  }
  loc.replace(repo + '/' + (path ? '?p=' + encodeURIComponent(path) : ''));
</script>
</head>
<body>
</body>
</html>
